    definition_owner: Operations
    format: days
    example_questions:
      - "How long does it take us to ship an order?"
      - "Which warehouse ships fastest?"
      - "Has fulfillment speed gotten worse this year?"

  - name: return_rate_pct
    tenant: mro
    domain: Order to Cash
    sentiment: negative
    grain: Company total over full history; return lines as a share of order lines.
    tables:
      - mro_distributor.o2c_return_line
      - mro_distributor.o2c_sales_order_line
    description: |
      Percentage of sales order lines that come back as customer returns —
      about 3% overall. Returns carry coded reasons (Damaged, Wrong Item,
      Overordered, Quality), so Operations reviews rate by reason and by item
      category to separate carrier damage from supplier quality problems.
      A sustained rise above the baseline triggers a supplier quality review.
    formula: |
      SELECT
        (SELECT COUNT(*) FROM mro_distributor.o2c_return_line) * 100.0
        / (SELECT COUNT(*) FROM mro_distributor.o2c_sales_order_line)
    dimensions_allowed:
