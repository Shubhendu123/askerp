      - order volume
      - transactions
      - how many orders
      - deal count
    definition_owner: Sales
    format: integer
    example_questions:
      - "How many orders did we receive last month?"
      - "Which warehouse handles the most orders?"
      - "Is order volume growing year over year?"

  - name: avg_order_to_ship_days
    tenant: mro
    domain: Order to Cash
    sentiment: negative
    grain: Per fulfillment line, averaged over full history.
    tables:
      - mro_distributor.o2c_fulfillment_line
    description: |
      Average days from order placement to shipment — the customer-facing
      fulfillment speed measure. Company average is around 2-3 days, but items
      sourced from unreliable (tier C and D) suppliers ship materially slower
      (up to ~7 days) because they stock out more often. Rising order-to-ship
      days is the operational symptom that connects supplier lateness to
      delayed invoicing and slower cash collection.
    formula: |
      SELECT AVG(ff.order_to_ship_days)
      FROM mro_distributor.o2c_fulfillment_line ff
    dimensions_allowed:
      - dim_warehouse.warehouse_name
      - dim_item.category
      - dim_customer.segment
      - dim_date.year_num
      - dim_date.quarter_num
    synonyms:
